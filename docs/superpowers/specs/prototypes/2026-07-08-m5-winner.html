.wrap{max-width:1080px;margin:0 auto;padding:20px 24px}

const $=s=>document.querySelector(s);
const esc=t=>t.replace(/&/g,"&amp;").replace(/</g,"&lt;");
function thumbStyle(it){return `background-color:hsl(${it.hue} 32% 40%);background-image:linear-gradient(200deg,rgba(255,255,255,.22),rgba(255,255,255,0) 50%),linear-gradient(160deg,hsl(${it.hue} 34% 48%),hsl(${(it.hue+40)%360} 40% 28%))`}
function mono(it){return it.title.split(/\s+/).slice(0,2).map(w=>w[0]).join("").toUpperCase()}
function badge(a){return `<span class="badge ${a.kind==='owned'?'own':(a.sub?'sub':'')}">${a.svc}${a.kind==='owned'?' · owned':''}</span>`}

function renderTab(){
  const inGroup=items.filter(i=>i.group===ui.group);
  let list=inGroup.filter(i=>i.state===ui.state);
  if(ui.group==="movies-tv"&&ui.sub!=="all")list=list.filter(i=>i.type===ui.sub);
  if(ui.avail)list=list.filter(i=>i.avail.some(a=>a.kind==="owned"||a.sub));
  const key={added:i=>i.added,year:i=>i.year,rating:i=>i.rating,title:i=>i.title.toLowerCase()}[ui.sort];
  list.sort((a,b)=>{const x=key(a),y=key(b);return (x<y?-1:x>y?1:0)*ui.dir});
  const states=Object.entries(stateNames).map(([k,v])=>{
    const n=inGroup.filter(i=>i.state===k).length;
    return `<button class="${ui.state===k?'on':''}" onclick="setState('${k}')">${v}<span class="mono">${n}</span></button>`}).join("");
  const subtabs=ui.group!=="movies-tv"?"":`<div class="subtabs">
    ${[["all","All"],["movie","Movies"],["tv","TV"]].map(([k,v])=>`<button class="${ui.sub===k?'on':''}" onclick="setSub('${k}')">${v}</button>`).join("")}</div>`;
  const th=(k,label,cls)=>`<th class="${cls||''}"><button onclick="setSort('${k}')">${label}${ui.sort===k?`<span class="dir">${ui.dir>0?"↑":"↓"}</span>`:""}</button></th>`;
  const rows=list.map(it=>`<tr class="${dotClass[it.group]}" onclick="openDetail(${it.id})">
    <td style="width:38px"><span class="thumb" style="${thumbStyle(it)}">${mono(it)}</span></td>
    <td class="titlecell">${esc(it.title)}<span class="sub">${it.genres.join(" · ")}</span></td>
    <td><span class="typechip ${it.type}">${it.type.toUpperCase()}</span></td>
    <td class="mono">${it.year}</td>
    <td class="mono">★ ${it.rating}</td>
    <td>${it.avail.map(badge).join(" ")||`<span style="color:var(--muted)">—</span>`}</td>
    <td><span class="state ${it.state}">${stateNames[it.state]}</span></td>
    <td class="mono" style="color:var(--muted)">${it.added}</td></tr>`).join("");
  $("#view").innerHTML=`
   <div class="toolbar">
     <div class="states">${states}</div>
     ${subtabs}
     <div class="tool-right">
       <div class="sizes">${[["s","S","38px"],["m","M","56px"],["l","L","84px"]].map(([k,v])=>`<button class="${ui.thumb===k?'on':''}" onclick="setThumb('${k}')">${v}</button>`).join("")}</div>
       <label class="avail"><input type="checkbox" ${ui.avail?"checked":""} onchange="ui.avail=this.checked;renderTab()">Available to me</label>
     </div>
   </div>
   <div class="tablewrap"><table>
     <thead><tr><th></th>${th("title","Title")}<th>Type</th>${th("year","Year")}${th("rating","Rating")}<th>Availability</th><th>State</th>${th("added","Added")}</tr></thead>
     <tbody>${rows||`<tr><td colspan="8" class="empty">Nothing here — try another filter.</td></tr>`}</tbody>
   </table></div>
   <p class="resultmeta mono">${list.length} of ${inGroup.length} items · sorted by ${ui.sort} ${ui.dir>0?"asc":"desc"} · column headers sort</p>`;
}

const dotClass={"movies-tv":"video",books:"book",games:"game"};
function groupedPanel(list,row){
  return ["movies-tv","books","games"].map(g=>{
    const sub=list.filter(i=>i.group===g);
    if(!sub.length)return "";
    return `<div class="ph"><span class="tdot ${dotClass[g]}"></span>${groupLabel[g]}<span class="mono">${sub.length}</span></div>`+
      sub.map(row).join("");
  }).join("");
}
function renderHome(){
  const cont=items.filter(i=>i.state==="in_progress");
  const news=items.filter(i=>i.avail.some(a=>a.isnew&&a.sub));
  const contRow=it=>`<button class="lrow ${dotClass[it.group]}" onclick="openDetail(${it.id})">
        <span class="thumb" style="${thumbStyle(it)}">${mono(it)}</span>
        <span><span class="lt">${esc(it.title)}</span><br><span class="ls">${it.genres.join(" · ")}</span></span>
        <span class="right"><span class="state in_progress">In progress</span></span></button>`;
  const newRow=it=>{const a=it.avail.find(a=>a.isnew);
        return `<button class="lrow ${dotClass[it.group]}" onclick="openDetail(${it.id})">
        <span class="thumb" style="${thumbStyle(it)}">${mono(it)}</span>
        <span><span class="lt">${esc(it.title)}</span><br><span class="ls">now on ${a.svc}</span></span>
        <span class="right mono">this cycle</span></button>`};
  $("#view").innerHTML=`
   <div class="homegrid">
    <div>
     <h2 class="sec">Continue</h2>
     <div class="panel">${groupedPanel(cont,contRow)}</div>
    </div>
    <div>
     <h2 class="sec">Newly available on your services</h2>
     <div class="panel">${groupedPanel(news,newRow)}</div>
    </div>
   </div>
   <h2 class="sec">Library</h2>
   <div class="panel">${["movies-tv","books","games"].map(g=>{
     const f=s=>items.filter(i=>i.group===g&&i.state===s).length;
     return `<button class="libline ${dotClass[g]}" onclick="openTab('${g}')">
       <span class="g" style="display:flex;gap:8px;align-items:center"><span class="tdot ${dotClass[g]}"></span>${groupLabel[g]}</span>
       <span class="mono">${f("want_to")} want to</span><span class="mono">${f("in_progress")} in progress</span>
       <span class="mono">${f("done")} done</span><span class="mono" style="margin-left:auto">→</span></button>`}).join("")}</div>`;
}

function renderDetail(){
  const it=items.find(i=>i.id===ui.detail);
  const rsrc=it.ratings.map(r=>`<div class="rsource"><div class="rv mono">${r.d}</div><div class="rn">${r.s}</div><a href="#" onclick="return false">open ↗</a></div>`).join("");
  const av=it.avail.length?`<div class="avrow">${it.avail.map(a=>`
      <span class="avchip ${a.kind==='owned'?'own':(a.sub?'sub':'')}">${a.svc}<span class="k">${a.kind==='owned'?'owned · store page ↗':(a.sub?'subscribed':'not subscribed')}</span></span>`).join("")}</div>`
    :`<span style="color:var(--muted)">No availability data.</span>`;
  const trans=legal[it.state].map((t,i)=>`<button class="tbtn ${i===0?'primary':''}" onclick="doTransition(${it.id},'${t}')">${({want_to:"Move to Want to",in_progress:it.state==='done'?"Re-watch / resume":"Start",done:"Mark done",abandoned:"Abandon"})[t]}</button>`).join("");
  const verdict=["liked","ok","disliked"].map(v=>`<button class="${it.verdict===v?'on':''}" onclick="setVerdict(${it.id},'${v}')">${v==='liked'?'Liked':v==='ok'?'It was OK':'Disliked'}</button>`).join("");
  const terminal=it.state==="done"||it.state==="abandoned";
  $("#view").innerHTML=`
   <a class="back" href="#" onclick="closeDetail();return false">← Back to ${groupLabel[it.group]}</a>
   <div class="detail">
     <div class="dcoverwrap"><div class="bigcover" style="${thumbStyle(it)}">${mono(it)}</div></div>
     <div>
       <h1 class="dtitle">${esc(it.title)}</h1>
       <div class="dsub mono"><span class="typechip ${it.type}">${it.type.toUpperCase()}</span> · ${it.year} · ${it.genres.join(" · ")} · <span class="state ${it.state}">${stateNames[it.state]}</span>${it.completed?` · completed ${it.completed}`:""}</div>
       <div class="dsection"><h3>Status</h3><div class="transitions">${trans}</div></div>
       ${terminal?`<div class="dsection"><h3>Verdict</h3><div class="verdict">${verdict}</div></div>`:""}
       <div class="dsection"><h3>Ratings</h3><div class="ratings">${rsrc}</div></div>
       <div class="dsection"><h3>Where to ${it.group==='games'?'play':it.group==='books'?'read':'watch'}</h3>${av}</div>
       <div class="dsection notes"><h3>Notes</h3>
         <div id="nwrap"><textarea id="ntext">${esc(it.notes||"")}</textarea></div>
         <div class="nbar">
           <button class="tbtn" onclick="togglePreview(${it.id})" id="pbtn">Preview</button>
           <button class="tbtn primary" onclick="this.textContent='Saved ✓';setTimeout(()=>this.textContent='Save notes',1200)">Save notes</button>
           <span class="savehint">Markdown supported · saved explicitly, no autosave</span>
         </div></div>
       <div class="dsection"><h3>Details</h3><dl class="metagrid">
         <dt>Provider</dt><dd class="mono">${it.group==='games'?'igdb':it.group==='books'?'openlibrary':'tmdb'} · id ${it.id*137}</dd>
         <dt>Added</dt><dd class="mono">${it.added}</dd>
         <dt>Refreshed</dt><dd class="mono">2026-07-07 04:12</dd></dl></div>
     </div></div>`;
}

let preview=false;
function togglePreview(id){
  const it=items.find(i=>i.id===id);preview=!preview;
  const w=$("#nwrap");
  if(preview){it.notes=$("#ntext").value;
    w.innerHTML=`<div class="nprev">${esc(it.notes||"*nothing yet*").replace(/\*\*(.+?)\*\*/g,"<b>$1</b>").replace(/\*(.+?)\*/g,"<em>$1</em>")}</div>`;
    $("#pbtn").textContent="Edit";
  } else {w.innerHTML=`<textarea id="ntext">${esc(it.notes||"")}</textarea>`;$("#pbtn").textContent="Preview";}
}
function doTransition(id,to){const it=items.find(i=>i.id===id);it.state=to;
  if(to==="done"||to==="abandoned"){it.completed=new Date().toISOString().slice(0,10)}else{delete it.verdict;delete it.completed}
  renderDetail()}
function setVerdict(id,v){items.find(i=>i.id===id).verdict=v;renderDetail()}
function openDetail(id){ui.detail=id;ui.view="detail";render()}
function closeDetail(){ui.view=ui.group?"tab":"home";ui.detail=null;render()}
function openTab(g){ui.group=g;ui.view="tab";ui.state="want_to";ui.sub="all";render();
  document.querySelectorAll("#tabs button").forEach(b=>b.classList.toggle("on",b.dataset.v===g))}
function setState(s){ui.state=s;renderTab()}
function setSub(s){ui.sub=s;renderTab()}
function setThumb(k){ui.thumb=k;
  document.documentElement.style.setProperty("--thumb-h",{s:"38px",m:"56px",l:"84px"}[k]);renderTab()}
function setSort(k){if(ui.sort===k)ui.dir*=-1;else{ui.sort=k;ui.dir=k==="title"?1:-1}renderTab()}
function render(){
  if(ui.view==="home")renderHome();else if(ui.view==="tab")renderTab();else renderDetail();
  window.scrollTo(0,0)}
document.querySelectorAll("#tabs button").forEach(b=>b.addEventListener("click",()=>{
  const v=b.dataset.v;
  document.querySelectorAll("#tabs button").forEach(x=>x.classList.toggle("on",x===b));
  if(v==="home"){ui.view="home";ui.group=null}else{ui.group=v;ui.view="tab";ui.state="want_to";ui.sub="all"}
  render()}));

const qpop=$("#qpop");
$("#q").addEventListener("input",e=>{
  const q=e.target.value.trim().toLowerCase();
  if(!q){qpop.classList.remove("open");return}
  const hits=items.filter(i=>i.title.toLowerCase().includes(q)).slice(0,4);
  qpop.innerHTML=(hits.map(it=>`<button class="cand" onclick="openDetail(${it.id});qpop.classList.remove('open');document.getElementById('q').value=''">
     <span class="thumb" style="${thumbStyle(it)}"></span>
     <span><span class="ct">${esc(it.title)}</span><br><span class="cs">${it.year} · ${it.type.toUpperCase()} · already in library → opens item</span></span></button>`).join(""))+
   `<div class="hint">In the real app this searches TMDB / Open Library / IGDB and adding is one click; duplicates redirect here.</div>`;
  qpop.classList.add("open");
});
document.addEventListener("click",e=>{if(!e.target.closest(".searchbox"))qpop.classList.remove("open")});
render();
</script>
